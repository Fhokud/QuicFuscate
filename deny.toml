[graph]
targets = []
all-features = true
no-default-features = false

[advisories]
version = 2
yanked = "deny"
ignore = [
  "RUSTSEC-2024-0436",
]

[licenses]
version = 2
confidence-threshold = 0.8
allow = [
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "MIT",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Unicode-3.0",
  "CDLA-Permissive-2.0",
  "Zlib",
  "BSL-1.0",
  "CC0-1.0",
  "Unlicense",
  "OpenSSL",
  "MIT-0",
]

[bans]
multiple-versions = "allow"
wildcards = "allow"
highlight = "all"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
