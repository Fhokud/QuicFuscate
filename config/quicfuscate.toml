# QuicFuscate Configuration File
# Complete configuration with all stealth and performance options
# 
# This is the canonical runtime configuration for QuicFuscate.
# Used by engine embedding and CLI `--config` loading paths.
# Load via: QuicFuscateEngine::from_file("config/quicfuscate.toml")

# ==============================================================================
# ENGINE CONFIGURATION
# ==============================================================================

[engine]
# Engine operation mode
# Options: "client", "server"
mode = "client"

# Log level (overrides [logging].level when set to a non-default value)
# Wired: takes precedence over [logging].level at server startup if explicitly changed.
# Options: "error", "warn", "info", "debug", "trace"
log_level = "info"

# Auto-start on engine creation
# NOTE: Engine API design requires explicit .start() call. This field is parsed
# but intentionally not auto-triggered to avoid surprising embedders.
auto_start = false

# Graceful shutdown timeout (milliseconds)
# Wired: engine stop() waits up to this duration for the server loop thread to exit.
shutdown_timeout_ms = 5000

# ==============================================================================
# CONNECTION CONFIGURATION
# ==============================================================================

[connection]
# Remote endpoint (server mode: listen address, client mode: server address)
remote = "0.0.0.0:4433"

# Local bind address (client mode: optional local bind)
local = ""

# Verify peer certificate (client mode)
verify_peer = true

# Custom CA file for peer verification (empty = system CAs)
ca_file = ""

# TLS certificate file (server mode, required)
cert_file = ""

# TLS private key file (server mode, required)
key_file = ""

# Application Layer Protocol Negotiation
alpn = ["h3", "quicfuscate"]

# Server Name Indication (client mode, empty = use remote hostname)
sni = ""

# Connection idle timeout (milliseconds, 0 = no timeout)
idle_timeout_ms = 30000

# Enable 0-RTT early data - ENGINE LEVEL (server + client, controls quiche TransportConfig).
# Reduces handshake latency by one round-trip.
# Requires [anti_replay] enabled = true for production use.
# Relationship to [transport].enable_early_data: both activate the same quiche
# transport 0-RTT mechanism but at different points:
#   - This field (connection.enable_0rtt) is applied in the engine initialization path
#     (engine.rs) and affects server accept + the engine-managed transport config.
#   - [transport].enable_early_data is applied in the client connection setup path
#     (client/connection.rs) and controls the per-connection QUIC transport config.
# For full 0-RTT, enable BOTH fields. Disabling either disables 0-RTT on that path.
enable_0rtt = true

# Maximum bidirectional streams
# Wired: overrides [transport].initial_max_streams_bidi when set to a different non-zero value.
# Both fields are accepted for convenience; [transport] is the primary source.
max_streams_bidi = 100

# Maximum unidirectional streams
# Wired: overrides [transport].initial_max_streams_uni when set to a different non-zero value.
max_streams_uni = 100

# Connection migration support (new paths must complete PATH_CHALLENGE/PATH_RESPONSE validation)
enable_migration = true

# ==============================================================================
# 0-RTT ANTI-REPLAY PROTECTION
# ==============================================================================

[anti_replay]
# Enable anti-replay protection for 0-RTT early data (server mode only).
# A strike register tracks seen 0-RTT packets and rejects replays.
# Per RFC 8446 Section 8 and RFC 9001 Section 9.2.
enabled = true

# Maximum ticket age in seconds before 0-RTT is rejected.
# RFC 8446 recommends a small window. Default: 10 seconds.
max_ticket_age_secs = 10

# Maximum entries in the strike register.
# Each entry is ~48 bytes. 100,000 entries = ~5 MB memory.
max_entries = 100000

# Maximum early data size in bytes per connection.
# Limits how much 0-RTT data the server accepts. Default: 16384 (16 KB).
max_early_data_size = 16384

# ==============================================================================
# CRYPTO CONFIGURATION
# ==============================================================================

[crypto]
# AEAD cipher preference
# Options: "auto", "aegis-128l", "morus"
# - auto: Select best based on CPU features (recommended)
# - aegis-128l: Prefer AEGIS-128L when hardware AES is available
# - morus: Prefer MORUS-1280-128
aead_preference = "auto"

# Force specific AEAD (overrides preference, useful for testing or constrained deployments)
# Options: "auto", "aegis-128l", "morus" (empty string = use preference above)
force_aead = ""

# ==============================================================================
# STEALTH CONFIGURATION
# ==============================================================================

[stealth]
# Stealth operation mode
# Options: "off", "performance", "stealth", "anti-dpi", "intelligent", "manual"
# - off:          No stealth features enabled
# - performance:  Minimal fingerprinting, costly features off (alias: "base")
# - stealth:      Balanced features with minimal overhead
# - anti-dpi:     Ultra stealth with aggressive settings (alias: "max")
# - intelligent:  Adaptive mode, escalates on probe detection (alias: "auto")
# - manual:       Custom configuration (use settings below)
mode = "auto"

# Manual mode settings (only used when mode = "manual")
# ------------------------------------------------------------------------------

# Domain fronting - Hide real destination behind CDN domains
enable_domain_fronting = true

# HTTP/3 masquerading - Make QUIC traffic look like HTTP/3
enable_http3_masquerading = true

# TLS Cover - Use synthetic cover handshakes for DPI evasion
# When false, uses real TLS only
use_tls_cover = true

# QPACK headers - Use QPACK compression for HTTP/3 headers
use_qpack_headers = true

# Traffic padding - Add padding to obscure packet sizes
# WARNING: May impact performance
enable_traffic_padding = false

# Timing obfuscation - Add random delays between packets
# WARNING: Will impact latency
enable_timing_obfuscation = false

# Protocol mimicry - Make QUIC look like other protocols
# Wired: contributes to StealthConfig::is_active() composite check and flows through
# client connection + subsystems initialization. QUIC traffic mimicry is achieved via
# TLS Cover and HTTP/3 masquerading (above); this flag enables/disables that as a group.
enable_protocol_mimicry = true

# DNS-over-HTTPS - Use encrypted DNS resolution
enable_doh = true

# DoH provider URL
# Options: 
# - "https://cloudflare-dns.com/dns-query" (fast)
# - "https://dns.quad9.net/dns-query" (privacy-focused)
# - "https://dns.google/dns-query"
doh_provider = "https://cloudflare-dns.com/dns-query"

# Padding configuration
# Strategy options: "random", "fixed", "adaptive", "browser_mimic"
padding_strategy = "adaptive"
max_padding_size = 256  # bytes (256 for auto, 2048 for max)

# Custom fronting domains (leave empty to use default CDN rotation)
fronting_domains = []

# Browser and OS profiles for fingerprinting
initial_browser = "chrome"  # chrome, firefox, safari, edge
initial_os = "windows"      # windows, macos, linux, android, ios

# ==============================================================================
# FINGERPRINT ROTATION
# ==============================================================================

[fingerprint_rotation]
# Enable fingerprint rotation (independent of stealth mode)
enabled = false

# Rotation interval in seconds (0 = disabled)
# Auto mode: 0 (disabled)
# Max mode: 120 (2 minutes)
interval_secs = 300  # 5 minutes

# Rotation mode
# Options: "fixed", "slots", "all"
# - fixed: Single profile, no rotation
# - slots: Rotate through configured profile_slots
# - all: Rotate through all available profiles
# Wired: Fixed = no rotation, Slots = rotate through profile_slots, All = all browser/OS combos.
mode = "fixed"

# Profile slots for rotation (up to 3)
# Format: ["browser:os", "browser:os", "browser:os"]
# Leave empty to use defaults based on mode
profile_slots = [
    "chrome:windows",
    "firefox:windows",
    "safari:macos"
]

# ==============================================================================
# FEC (FORWARD ERROR CORRECTION)
# ==============================================================================

[fec]
# FEC operation mode
# Options: "auto", "off"
# - auto: Adaptive FEC controller adjusts redundancy based on measured packet loss (default)
# - off: Disable FEC entirely
mode = "auto"

# Initial bootstrap mode for the adaptive controller
# Options: "auto", "off"
initial_mode = "auto"

# FEC window sizes for different quality levels
window_excellent = 0    # No FEC when network is excellent
window_good = 10       # Light FEC
window_fair = 30       # Medium FEC
window_poor = 50       # Heavy FEC

# Enable partial recovery for streaming
enable_partial = true

# PID controller for adaptive mode
enable_pid = true

# Hysteresis for mode switching (prevents oscillation)
enable_hysteresis = true

# Kalman filter for better predictions
enable_kalman = true

# Streaming emission period (packets)
stream_every = 5

# ==============================================================================
# TRANSPORT CONFIGURATION
# ==============================================================================

[transport]
# Congestion control algorithm
# Congestion control algorithm.
# Options: "reno" (RFC 6582), "bbr2" (IETF draft, interim BBR3 fallback), "bbr3" (stealth, recommended)
cc_algorithm = "bbr3"

# Maximum Transmission Unit (bytes)
mtu = 1400

# Maximum UDP payload size (bytes)
max_udp_payload = 1350

# Maximum idle timeout (milliseconds)
max_idle_timeout = 30000

# Initial RTT estimate (milliseconds, used before first real measurement arrives)
# Wired: applied to Recovery::set_initial_rtt() on connection construction.
initial_rtt_ms = 100

# Enable pacing (smoother packet transmission)
enable_pacing = true

# Initial maximum data (bytes)
initial_max_data = 10000000

# Initial maximum stream data (bidirectional)
initial_max_stream_data_bidi_local = 1000000
initial_max_stream_data_bidi_remote = 1000000

# Initial maximum stream data (unidirectional)
initial_max_stream_data_uni = 1000000

# Initial maximum streams (bidirectional)
initial_max_streams_bidi = 100

# Initial maximum streams (unidirectional)
initial_max_streams_uni = 100

# Enable 0-RTT early data - CLIENT CONNECTION LEVEL (per-connection QUIC transport config).
# Relationship to [connection].enable_0rtt: see that field for the full explanation.
# This field gates 0-RTT on the client-side connection path (client/connection.rs).
# Default is false here because [connection].enable_0rtt = true already covers the
# engine-level path. Set both to true to enable 0-RTT on every code path.
enable_early_data = false

# QUIC DATAGRAM queue lengths (0 disables datagrams)
dgram_recv_queue_len = 1024
dgram_send_queue_len = 1024

# Disable path MTU discovery
disable_pmtud = false

# ==============================================================================
# PERFORMANCE OPTIMIZATION
# ==============================================================================

[optimization]
# Memory pool size in bytes. Pool is used for packet buffers and frame allocation.
# 0 = auto-detect based on available RAM (recommended).
memory_pool_size = 67108864  # 64MB

# Memory pool alignment in bytes. Should match CPU cache line size (64 bytes).
memory_pool_alignment = 64

# Number of Tokio worker threads. 0 = use default (8 threads).
num_worker_threads = 0

# ==============================================================================
# INTERFACE CONFIGURATION
# ==============================================================================

[interface]
# Interface type
# Options: "tun", "tap", "xdp", "raw_socket"
# "xdp" is compatibility/experimental only in this fork and is not the canonical production runtime path.
type = "tun"

# TUN/TAP configuration
tun_name = "quicfuse0"
tun_mtu = 1500

# Enable packet coalescing
# Wired: UdpFastPath::new_with_flags() accepts GSO/GRO toggles. The main server runtime
# uses tokio UdpSocket (not UdpFastPath) so these flags affect the harness/xdp fallback
# paths only. Values flow through interface config for future server path integration.
enable_gso = true
enable_gro = true

# XDP configuration (Linux only, compatibility/experimental only in this fork)
xdp_mode = "skb"  # Options: "skb", "driver", "hardware"
xdp_flags = ["update_if_noexist"]

# ==============================================================================
# TELEMETRY AND LOGGING
# ==============================================================================

[telemetry]
# Enable telemetry collection (controls TELEMETRY_ENABLED global flag)
enabled = true

# Telemetry export interval (seconds)
# NOTE: Telemetry uses a pull-based HTTP server (/telemetry endpoint) that responds
# on demand. This interval field is reserved for a future periodic push exporter.
export_interval = 60

# Metrics to collect
# Wired: each flag gates its category in the /telemetry export output.
collect_packet_stats = true
collect_stream_stats = true
collect_congestion_stats = true
collect_fec_stats = true
collect_stealth_stats = true

[logging]
# Log level: "error", "warn", "info", "debug", "trace"
# Wired: applied at server startup via LoggingConfig::effective() which respects mode overrides.
# RUST_LOG env var or admin API can further override at runtime.
level = "info"

# Log targets
# Wired: log_to_stdout=false (via mode=no-log or explicit) suppresses all stdout logging.
# log_to_file is parsed but file-based logging requires env_logger file target setup.
log_to_file = false
log_file_path = "/var/log/quicfuscate.log"
log_to_stdout = true

# ==============================================================================
# PRESETS (Quick configurations)
# ==============================================================================
# Uncomment one of these to override all settings above

# Maximum privacy and stealth (performance impact)
# [preset.max_stealth]
# stealth.mode = "max"
# fec.mode = "auto"
# fingerprint_rotation.enabled = true
# fingerprint_rotation.mode = "all"
# fingerprint_rotation.interval_secs = 120

# Balanced performance and stealth (recommended)
# [preset.balanced]
# stealth.mode = "auto"
# fec.mode = "auto"
# fingerprint_rotation.enabled = false

# Maximum performance (no stealth)
# [preset.performance]
# stealth.mode = "off"
# fec.mode = "off"
# interface.enable_gso = true
# interface.enable_gro = true

# Development/testing mode
# [preset.development]
# stealth.mode = "manual"
# logging.level = "debug"
# telemetry.enabled = true
