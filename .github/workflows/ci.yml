name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  frontend-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.21"

      - name: Install Svelte desktop dependencies
        shell: bash
        working-directory: apps/svelte-desktop
        run: |
          bun install

      - name: Svelte desktop check + unit tests
        shell: bash
        working-directory: apps/svelte-desktop
        run: |
          bun run check
          bun run test:unit

      - name: Install Svelte admin dependencies
        shell: bash
        working-directory: apps/svelte-admin
        run: |
          bun install

      - name: Svelte admin check + unit tests
        shell: bash
        working-directory: apps/svelte-admin
        run: |
          bun run check
          bun run test:unit

  frontend-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.21"

      - name: Install Svelte admin dependencies
        shell: bash
        working-directory: apps/svelte-admin
        run: |
          bun install

      - name: Install Svelte desktop dependencies
        shell: bash
        working-directory: apps/svelte-desktop
        run: |
          bun install

      - name: Install Playwright browser for Svelte admin
        shell: bash
        working-directory: apps/svelte-admin
        run: |
          bunx playwright install --with-deps chromium

      - name: Install Playwright browser for Svelte desktop
        shell: bash
        working-directory: apps/svelte-desktop
        run: |
          bunx playwright install --with-deps chromium

      - name: Svelte admin full E2E suite
        shell: bash
        working-directory: apps/svelte-admin
        run: |
          bun run test:e2e

      - name: Svelte desktop full E2E suite
        shell: bash
        working-directory: apps/svelte-desktop
        run: |
          bun run test:e2e

      - name: Upload frontend E2E artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-e2e-results
          path: |
            apps/svelte-admin/test-results/
            apps/svelte-desktop/test-results/

  build-test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: "sccache"
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.93.0
          components: clippy

      - name: Set up sccache
        uses: mozilla-actions/sccache-action@v0.0.6

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      # Pure Cargo build/test (no vendored external QUIC stack)

      - name: Run Clippy
        shell: bash
        run: |
          cargo clippy --workspace --all-targets -- -D warnings

      - name: Verify release compilation
        shell: bash
        run: |
          cargo build --workspace --release

      - name: Run tests
        shell: bash
        run: |
          cargo test --workspace --all-targets

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ runner.os }}-binaries
          path: |
            target/release/quicfuscate*
            target/release/*.dll
            target/release/*.dylib
            target/release/*.so

  feature-matrix:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            features: ""
          - os: ubuntu-latest
            features: "rust-tests"
          - os: ubuntu-latest
            features: "simd-selfcheck"
          - os: ubuntu-latest
            features: "io_uring"
          - os: macos-latest
            features: ""
          - os: macos-latest
            features: "rust-tests"
          - os: macos-latest
            features: "simd-selfcheck"
          - os: windows-latest
            features: ""
          - os: windows-latest
            features: "rust-tests"
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: "sccache"
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@1.93.0

      - name: Set up sccache
        uses: mozilla-actions/sccache-action@v0.0.6

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: "Run all-targets feature matrix (features: ${{ matrix.features }})"
        shell: bash
        run: |
          if [ -n "${{ matrix.features }}" ]; then
            cargo test --workspace --all-targets --features "${{ matrix.features }}"
          else
            cargo test --workspace --all-targets
          fi

  linux-fastpath-gates:
    runs-on: ubuntu-latest
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: "sccache"
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.93.0

      - name: Set up sccache
        uses: mozilla-actions/sccache-action@v0.0.6

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: linux-fastpath-${{ hashFiles('**/Cargo.lock') }}

      - name: Run Linux fastpath transport suite
        shell: bash
        run: |
          bash scripts/tests/suites/test-transport.sh --output-dir scripts/out/tests/linux-fastpath-gates

      - name: Upload Linux fastpath artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: linux-fastpath-gates
          path: |
            scripts/out/tests/linux-fastpath-gates

  security-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.93.0

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Run cargo audit
        run: cargo audit --deny warnings

  fuzz-targets:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up nightly Rust
        uses: dtolnay/rust-toolchain@nightly

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked

      - name: Fuzz packet_parsing
        working-directory: scripts/tests/fuzz
        run: cargo +nightly fuzz run packet_parsing -- -max_total_time=60 -runs=1000

      - name: Fuzz frame_decoding
        working-directory: scripts/tests/fuzz
        run: cargo +nightly fuzz run frame_decoding -- -max_total_time=60 -runs=1000

      - name: Fuzz crypto_operations
        working-directory: scripts/tests/fuzz
        run: cargo +nightly fuzz run crypto_operations -- -max_total_time=60 -runs=1000

      - name: Fuzz fec_encoding
        working-directory: scripts/tests/fuzz
        run: cargo +nightly fuzz run fec_encoding -- -max_total_time=60 -runs=1000

      - name: Fuzz varint_parsing
        working-directory: scripts/tests/fuzz
        run: cargo +nightly fuzz run varint_parsing -- -max_total_time=60 -runs=1000

      - name: Fuzz connection_handling
        working-directory: scripts/tests/fuzz
        run: cargo +nightly fuzz run connection_handling -- -max_total_time=60 -runs=1000

      - name: Upload crash artifacts
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: fuzz-crashes
          path: scripts/tests/fuzz/artifacts/

  # ---------------------------------------------------------------------------
  # TODO-154: Performance Regression Detection (criterion + critcmp)
  # ---------------------------------------------------------------------------
  benchmarks:
    runs-on: ubuntu-latest
    needs: [build-test]
    if: github.event_name == 'pull_request'
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: "sccache"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@1.93.0

      - name: Set up sccache
        uses: mozilla-actions/sccache-action@v0.0.6

      - name: Cache cargo registry + criterion baselines
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: bench-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            bench-

      - name: Install critcmp
        run: cargo install critcmp --locked

      - name: Run baseline benchmarks (main)
        run: |
          git stash --include-untracked || true
          git checkout origin/main -- . 2>/dev/null || git checkout main -- . 2>/dev/null || true
          cargo bench --bench ci_regression --features benches -- --save-baseline main 2>&1 || echo "Baseline build skipped (bench target may not exist on main yet)"
          git checkout - -- . 2>/dev/null || true
          git stash pop 2>/dev/null || true

      - name: Run PR benchmarks and compare
        continue-on-error: true
        run: |
          bash scripts/benchmarks/bench-ci-regression.sh --baseline main --warn 15 --error 30

      - name: Upload criterion reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: criterion-reports
          path: target/criterion/

  # e2e-tls job removed: browser fingerprints are generated in-memory at runtime
  # (no .chlo files on disk). The job iterated non-existent directories and tested
  # nothing while consuming CI minutes. TLS correctness is covered by
  # rt-tls-cover-cipher and stealth/tests.rs integration tests.
