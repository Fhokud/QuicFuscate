name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  frontend-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.21"

      - name: Install desktop dependencies
        shell: bash
        working-directory: apps/desktop
        run: |
          bun install --frozen-lockfile

      - name: Desktop check + unit tests
        shell: bash
        working-directory: apps/desktop
        run: |
          bun run check
          bun run test:unit

      - name: Install web-admin dependencies
        shell: bash
        working-directory: apps/web-admin-ui
        run: |
          bun install --frozen-lockfile

      - name: Web-admin check + unit tests
        shell: bash
        working-directory: apps/web-admin-ui
        run: |
          bun run check
          bun run test:unit

  build-test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: false

      - name: Set up Rust
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable
          components: clippy
          override: true

      - name: Cache cargo registry
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      # Pure Cargo build/test (no vendored external QUIC stack)

      - name: Run Clippy
        shell: bash
        run: |
          cargo clippy --workspace --all-targets -- -D warnings

      - name: Run cppcheck
        shell: bash
        run: |
          if ! command -v cppcheck >/dev/null; then
            if [[ "${{ runner.os }}" == "Linux" ]]; then
              sudo apt-get update && sudo apt-get install -y cppcheck
            elif [[ "${{ runner.os }}" == "macOS" ]]; then
              brew install cppcheck
            elif [[ "${{ runner.os }}" == "Windows" ]]; then
              choco install cppcheck -y
            fi
          fi
          cppcheck --error-exitcode=1 -q src

      - name: Build
        shell: bash
        run: |
          cargo build --workspace --release

      - name: Run tests
        shell: bash
        run: |
          cargo test --workspace --all-targets

      - name: Upload artifacts
        uses: actions/upload-artifact@v3
        with:
          name: ${{ runner.os }}-binaries
          path: |
            target/release/quicfuscate*
            target/release/*.dll
            target/release/*.dylib
            target/release/*.so

  feature-matrix:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            features: ""
          - os: ubuntu-latest
            features: "rust-tests"
          - os: ubuntu-latest
            features: "simd-selfcheck"
          - os: ubuntu-latest
            features: "uring_sys"
          - os: macos-latest
            features: ""
          - os: macos-latest
            features: "rust-tests"
          - os: windows-latest
            features: ""
          - os: windows-latest
            features: "rust-tests"
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          profile: minimal

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Run all-targets feature matrix (features: ${{ matrix.features }})
        shell: bash
        run: |
          if [ -n "${{ matrix.features }}" ]; then
            cargo test --workspace --all-targets --features "${{ matrix.features }}"
          else
            cargo test --workspace --all-targets
          fi

  e2e-tls:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v3

      - name: Set up Rust
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable
          override: true

      - name: Cache cargo registry
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: "E2E TLS: decode ALL profiles (shell)"
        shell: bash
        run: |
          set -e
          if base64 --help 2>&1 | grep -q '\-d'; then DEC='-d'; else DEC='-D'; fi
          found=0
          for d in browser_profiles src/browser_profiles; do
            [ -d "$d" ] || continue
            for f in "$d"/*.chlo; do
              [ -e "$f" ] || continue
              base=$(basename "$f"); name=${base%.chlo}; browser=${name%%_*}; os=${name#*_}
              size=$(base64 $DEC "$f" | wc -c | tr -d ' ')
              printf ' - %-10s/%-10s | %6d bytes | head(16B): ' "${browser^}" "${os^}" $size
              base64 $DEC "$f" | dd bs=1 count=16 2>/dev/null | hexdump -v -e '16/1 "%02x"' | sed 's/..../& /g'
              echo
              found=1
            done
          done
          if [ "$found" = 0 ]; then echo 'No .chlo profiles found.'; fi

      - name: "E2E TLS: VERIFY ALL (shell)"
        shell: bash
        run: |
          set -e
          if base64 --help 2>&1 | grep -q '\-d'; then DEC='-d'; else DEC='-D'; fi
          failed=0; total=0
          for d in browser_profiles src/browser_profiles; do
            [ -d "$d" ] || continue
            for f in "$d"/*.chlo; do
              [ -e "$f" ] || continue
              total=$((total+1))
              s=${f%.chlo}.sha256
              base=$(basename "$f"); name=${base%.chlo}; browser=${name%%_*}; os=${name#*_}
              if [ ! -f "$s" ]; then echo " - ${browser^}/${os^}: [MISS] sidecar $s"; failed=$((failed+1)); continue; fi
              got=$(base64 $DEC "$f" | shasum -a 256 | awk '{print $1}')
              exp=$(tr -d '\n\r' < "$s")
              if [ "$got" = "$exp" ]; then echo " - ${browser^}/${os^}: [ OK ]"; else echo " - ${browser^}/${os^}: [FAIL] mismatch"; echo "    expected: $exp"; echo "         got: $got"; failed=$((failed+1)); fi
            done
          done
          echo "[E2E] Summary: total=$total failed=$failed"
          test $failed -eq 0
