[build]
# Unified target directory in repo root
target-dir = "target"

# Network settings
[net]
retry = 3
git-fetch-with-cli = true

[registries.crates-io]
protocol = "sparse"

[future-incompat-report]
frequency = 'always'

# --- Target-specific optimizations ---
# Uncomment the section matching your deployment target for optimal codegen.
# These set target-cpu flags that enable architecture-specific instructions.

# x86_64-v3 (Haswell+ / modern desktop & server CPUs with AVX2, BMI2, FMA)
# [target.x86_64-unknown-linux-gnu]
# rustflags = ["-C", "target-cpu=x86-64-v3"]

# x86_64-v4 (Skylake-X+ / AVX-512 capable servers)
# [target.x86_64-unknown-linux-gnu]
# rustflags = ["-C", "target-cpu=x86-64-v4"]

# aarch64 generic (ARM servers: AWS Graviton, Ampere Altra, etc.)
# [target.aarch64-unknown-linux-gnu]
# rustflags = ["-C", "target-cpu=neoverse-n1"]

# aarch64 native (build on the target machine for best codegen)
# [target.aarch64-unknown-linux-gnu]
# rustflags = ["-C", "target-cpu=native"]

# Apple Silicon (M1/M2/M3/M4 - macOS)
# [target.aarch64-apple-darwin]
# rustflags = ["-C", "target-cpu=apple-m1"]
