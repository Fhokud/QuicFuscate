[build]
# Einheitlicher Target-Ordner im Root
target-dir = "target"

# Standard: Dev-Build (schnell)
[profile.dev]
opt-level = 0
debug = true
lto = false
codegen-units = 256
incremental = true
panic = "unwind"

[profile.release]
opt-level = 3
debug = false
lto = "thin"
codegen-units = 1
strip = true
panic = "abort"

[profile.test]
opt-level = 0
debug = true

[profile.bench]
opt-level = 3
debug = false
lto = "thin"

# Workspace-Einstellungen
[workspace]
# Alle Crates teilen sich den Target-Ordner
target-dir = "target"

# Netzwerk/Performance
[net]
retry = 3
git-fetch-with-cli = true

[registries.crates-io]
protocol = "sparse"

[future-incompat-report]
frequency = 'always'
